name: YT-AI-Blog CI

# Trigger the workflow on pushes and pull requests to the main branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Cancel in-progress runs if a new commit is pushed to the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-security:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install Quality Tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 bandit

      - name: Check Code Formatting (Black)
        # Your requirements.txt already includes black, ensuring consistent formatting
        run: black --check .

      - name: Lint Code (Flake8)
        # Stops the build if there are Python syntax errors or undefined names
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Security Scan (Bandit)
        # Scans for common security issues in Python code
        run: bandit -r . -ll -ii -x "venv,env,tests"

  test:
    name: Run Django Tests
    needs: lint-and-security
    runs-on: ubuntu-latest
    
    # Provide dummy environment variables for CI environment
    env:
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY || 'ci-dummy-django-secret-key' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'ci-dummy-gemini-key' }}
      ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY || 'ci-dummy-assemblyai-key' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies (FFmpeg)
        # FFmpeg is required by yt-dlp to extract and process audio files
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Check Database Migrations
        # Ensures no missing migrations are pushed to the repository
        run: python manage.py makemigrations --check --dry-run

      - name: Run Tests with Coverage
        # Executes your Django test suite and records code coverage
        run: |
          coverage run manage.py test
          coverage report -m
          coverage xml

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14